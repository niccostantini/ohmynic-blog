<!doctype html>
<html lang="it">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f3fb">
		<meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#0f0d1a">
		<!-- Anti-FOWT: imposta data-theme e data-theme-color prima del primo paint -->
		<script>
			(function(){
				var s = localStorage.getItem('ohmynic-theme');
				var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
				var dark = s === 'dark' || ((!s || s === 'system') && prefersDark);
				document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
				var tc = localStorage.getItem('ohmynic-theme-color') || 'amethyst';
				document.documentElement.setAttribute('data-theme-color', tc);
				var hc = localStorage.getItem('ohmynic-theme-hc');
				if (hc === 'on') document.documentElement.setAttribute('data-theme-hc', 'on');
				var devPass = '%sveltekit.env.PUBLIC_DEV_PASSWORD%';
				if (devPass && !sessionStorage.getItem('__dev_ok')) {
					var entered = window.prompt('Password di accesso:');
					if (entered !== devPass) {
						document.documentElement.innerHTML = '<body style="font-family:sans-serif;padding:2rem;background:#f5f3fb"><p style="color:#7c55d4">Accesso negato.</p></body>';
					} else {
						sessionStorage.setItem('__dev_ok', '1');
					}
				}
			})();
		</script>
		%sveltekit.env.PUBLIC_NOINDEX%
		<!-- Critical font preloads — Inter regular + 600 used on every page.
		     Stable filenames in static/fonts/ so the URL is predictable in this template. -->
		<link rel="preload" href="%sveltekit.assets%/fonts/inter-regular.woff2" as="font" type="font/woff2" crossorigin>
		<link rel="preload" href="%sveltekit.assets%/fonts/inter-600.woff2" as="font" type="font/woff2" crossorigin>
		<!-- Playfair Display 600: used for all headings (h1, h2, h3). Stable path → URL matches @font-face in fonts.css. -->
		<link rel="preload" href="%sveltekit.assets%/fonts/playfair-600.woff2" as="font" type="font/woff2" crossorigin>
		<!-- Tabler Icons NOT loaded globally — only on pages that need it ([slug], lettore/[id], admin). -->
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="tap">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
