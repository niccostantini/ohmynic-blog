version: '3.8'

services:
  libretranslate:
    image: libretranslate/libretranslate:latest
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      LT_LOAD_ONLY: "it,en"
      LT_UPDATE_MODELS: "true"
    volumes:
      - libretranslate_data:/home/libretranslate/.local

volumes:
  libretranslate_data:
