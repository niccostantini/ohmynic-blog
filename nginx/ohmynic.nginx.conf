server {
    listen 80;

    client_max_body_size 20m;
    server_name ohmynic.co www.ohmynic.co;

    # ── Rahoot WebSocket ─────────────────────────────────────────────────────
    location /rahoot/ws {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /rahoot/ {
        proxy_pass http://127.0.0.1:3002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Lista spesa ──────────────────────────────────────────────────────────
    location /lista-spesa/api {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Sitemap ──────────────────────────────────────────────────────────────
    location = /sitemap.xml {
        proxy_pass http://localhost:3000/blog/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Blog font cache (regex, prima di /blog prefix) ───────────────────────
    location ~* ^/blog/fonts/.*\.(woff2|woff|ttf)$ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Cache-Control;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* ^/blog/_app/immutable/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Cache-Control;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Pagine errore blog (internal — non accessibili dall'esterno) ─────────
    location ^~ /blog-errors/ {
        internal;
        alias /var/www/html/blog/;
    }

    # ── Pagine errore blog-dev (internal) ────────────────────────────────────
    location ^~ /dev-errors/ {
        internal;
        alias /var/www/html/dev/;
    }

    # ── Blog (produzione → porta 3000) ───────────────────────────────────────
    location /blog {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_intercept_errors on;
        # Solo errori gateway (app giù) — 4xx/5xx applicativi li gestisce SvelteKit
        error_page 502 /blog-errors/502.html;
        error_page 503 /blog-errors/503.html;
        error_page 504 /blog-errors/504.html;
    }

    # ── Blog dev (porta 3008) ─────────────────────────────────────────────────
    location /blog-dev {
        proxy_pass http://localhost:3008;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_intercept_errors on;
        error_page 502 /dev-errors/502.html;
        error_page 503 /dev-errors/503.html;
        error_page 504 /dev-errors/504.html;
    }

    # ── Static / robots ──────────────────────────────────────────────────────
    location = /robots.txt {
        add_header Cache-Control "public, max-age=86400";
    }

    location / {
        root /var/www/ohmynic;
        try_files $uri $uri/ /index.html;
    }

    location /lista-spesa {
        alias /var/www/lista-spesa/;
        try_files $uri $uri/ /lista-spesa/index.html;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/ohmynic.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ohmynic.co/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.ohmynic.co) { return 301 https://$host$request_uri; }
    if ($host = ohmynic.co) { return 301 https://$host$request_uri; }
    listen 80;
    server_name ohmynic.co www.ohmynic.co;
    return 404;
}

# ── blog.ohmynic.co ──────────────────────────────────────────────────────────
server {
    listen 80;
    server_name blog.ohmynic.co;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://ohmynic.co/blog$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name blog.ohmynic.co;

    ssl_certificate /etc/letsencrypt/live/blog.ohmynic.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blog.ohmynic.co/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://ohmynic.co/blog$request_uri;
}

# ── dev.ohmynic.co ───────────────────────────────────────────────────────────
server {
    listen 80;
    server_name dev.ohmynic.co;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://ohmynic.co/blog-dev$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name dev.ohmynic.co;

    ssl_certificate /etc/letsencrypt/live/dev.ohmynic.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.ohmynic.co/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://ohmynic.co/blog-dev$request_uri;
}
