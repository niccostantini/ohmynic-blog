  :root {
    --color-notte:      #1e1630;
    --color-prugna:     #3b2f5e;
    --color-viola:      #7c55d4;
    --color-lavanda:    #9b6ff0;
    --color-nebbia:     #f5f3fb;
    --color-iris:       #ece7fa;
    --color-bordo:      #d8d0f0;
    --color-bordo-soft: #ede9f8;
    --color-grafite:    #6b5f8a;
    --color-lilla:      #8e82b0;

    --font-serif: 'Playfair Display', Georgia, 'Times New Roman', serif;
    --font-sans:  'Inter', system-ui, sans-serif;

    --radius-md:   8px;
    --radius-lg:   12px;
    --radius-xl:   16px;
    --radius-pill: 999px;

    --shadow-lg: 0 8px 32px rgba(30, 22, 48, 0.14);
    --transition-fast: 120ms ease;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
  }

  body {
    font-family: var(--font-sans);
    background-color: var(--color-nebbia);
    color: var(--color-notte);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  .card {
    background: var(--color-iris);
    border: 0.5px solid var(--color-bordo);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-lg);
    padding: 52px 48px 48px;
    max-width: 480px;
    width: 100%;
    text-align: center;
  }

  .eyebrow {
    display: inline-block;
    font-family: var(--font-sans);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--color-lavanda);
    background: white;
    border: 0.5px solid var(--color-bordo);
    border-radius: var(--radius-pill);
    padding: 3px 12px;
    margin-bottom: 24px;
  }

  .error-code {
    font-family: var(--font-serif);
    font-size: 100px;
    font-weight: 600;
    line-height: 1;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--color-lavanda) 30%, var(--color-viola));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .divider {
    width: 40px;
    height: 1.5px;
    background: var(--color-bordo);
    border: none;
    margin: 20px auto 24px;
  }

  .title {
    font-family: var(--font-serif);
    font-size: 26px;
    font-weight: 600;
    line-height: 1.2;
    color: var(--color-notte);
    letter-spacing: -0.01em;
    margin-bottom: 16px;
  }

  .desc {
    font-size: 14px;
    color: var(--color-grafite);
    line-height: 1.6;
    margin-bottom: 28px;
  }

  .scenarios {
    list-style: none;
    text-align: left;
    background: white;
    border: 0.5px solid var(--color-bordo-soft);
    border-radius: var(--radius-lg);
    padding: 16px 20px;
    margin-bottom: 32px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .scenarios li {
    font-size: 14px;
    color: var(--color-grafite);
    line-height: 1.5;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .scenarios li::before {
    content: '';
    display: block;
    flex-shrink: 0;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--color-lavanda);
    margin-top: 6px;
  }

  .code-hint {
    display: inline-block;
    font-family: 'Courier New', 'Monaco', monospace;
    font-size: 12px;
    color: var(--color-viola);
    background: white;
    border: 0.5px solid var(--color-bordo);
    border-radius: 4px;
    padding: 2px 8px;
    margin-bottom: 28px;
  }

  .btn {
    display: inline-block;
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 500;
    background: var(--color-notte);
    color: var(--color-nebbia);
    padding: 10px 24px;
    border-radius: var(--radius-md);
    border: none;
    cursor: pointer;
    letter-spacing: 0.04em;
    text-decoration: none;
    transition: background var(--transition-fast), transform var(--transition-fast);
    border-bottom: none;
  }

  .btn:hover {
    background: var(--color-prugna);
    color: var(--color-nebbia);
    border-bottom: none;
    transform: translateY(-1px);
  }

  .footnote {
    display: block;
    margin-top: 12px;
    font-size: 12px;
    color: var(--color-lilla);
    letter-spacing: 0.02em;
  }

  .bg-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.35;
    pointer-events: none;
    z-index: -1;
  }
  .bg-orb-1 {
    width: 400px; height: 400px;
    background: var(--color-lavanda);
    top: -100px; right: -100px;
  }
  .bg-orb-2 {
    width: 300px; height: 300px;
    background: var(--color-viola);
    bottom: -80px; left: -80px;
  }

  @media (max-width: 520px) {
    .card { padding: 40px 28px 36px; }
    .error-code { font-size: 80px; }
    .title { font-size: 22px; }
  }
  </style>
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <div class="card">
    <span class="eyebrow">Not Found</span>
    <div class="error-code">404</div>
    <hr class="divider">
    <h1 class="title">Pagina scomparsa</h1>
    <ul class="scenarios">
      <li>Questo path non esiste nel routing.</li>
      <li>Controlla le slug, le route dinamiche o il fatto che stai buildando la cosa giusta.</li>
    </ul>
    <a class="btn" href="https://ohmynic.co">Torna al blog</a>
    <small class="footnote">hai sbagliato path</small>
  </div>

</body>
</html>
